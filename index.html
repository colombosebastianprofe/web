<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratorio de Autenticación Propia</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="bg-slate-800 p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-700 text-center">
        
        <div id="pantalla-inicio" class="space-y-6">
            <h1 class="text-3xl font-black text-emerald-400">¡Hola Mundo! 👋</h1>
            <p class="text-sm text-slate-400">Sistema de autenticación local administrado desde tu Google Sheets.</p>
            
            <div class="grid grid-cols-2 gap-4 pt-2">
                <button onclick="cambiarSeccion('seccion-login')" class="bg-emerald-500 hover:bg-emerald-600 text-slate-900 font-bold py-3 px-4 rounded-xl transition-all cursor-pointer shadow-lg">
                    Iniciar Sesión
                </button>
                <button onclick="cambiarSeccion('seccion-registro')" class="bg-slate-700 hover:bg-slate-600 text-slate-200 font-bold py-3 px-4 rounded-xl transition-all cursor-pointer shadow-lg border border-slate-600">
                    Crear Usuario
                </button>
            </div>
        </div>

        <div id="seccion-login" class="hidden space-y-4">
            <h2 class="text-2xl font-bold text-emerald-400">Iniciar Sesión</h2>
            <div class="text-left space-y-1">
                <label class="text-xs text-slate-400 font-bold uppercase">Identificador (Email o DNI)</label>
                <input type="text" id="login-email" placeholder="Ej: sebastian1978" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-slate-100 focus:outline-none focus:border-emerald-500">
            </div>
            <button onclick="ejecutarLogin()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-slate-900 font-bold py-3 rounded-xl transition-all cursor-pointer">Ingresar 🚀</button>
            <button onclick="cambiarSeccion('pantalla-inicio')" class="text-xs text-slate-500 underline block mx-auto pt-2">Volver al inicio</button>
        </div>

        <div id="seccion-registro" class="hidden space-y-4">
            <h2 class="text-2xl font-bold text-sky-400">Crear Usuario</h2>
            <div class="text-left space-y-3">
                <div>
                    <label class="text-xs text-slate-400 font-bold uppercase">Identificador (Email o DNI)</label>
                    <input type="text" id="reg-email" placeholder="Ej: alumno123" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-slate-100 focus:outline-none focus:border-sky-500">
                </div>
                <div>
                    <label class="text-xs text-slate-400 font-bold uppercase">Nombre de Pantalla</label>
                    <input type="text" id="reg-username" placeholder="Ej: Gonza_S" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-slate-100 focus:outline-none focus:border-sky-500">
                </div>
            </div>
            <button onclick="ejecutarRegistro()" class="w-full bg-sky-500 hover:bg-sky-600 text-slate-900 font-bold py-3 rounded-xl transition-all cursor-pointer">Registrar y Guardar 💾</button>
            <button onclick="cambiarSeccion('pantalla-inicio')" class="text-xs text-slate-500 underline block mx-auto pt-2">Volver al inicio</button>
        </div>

        <div id="pantalla-bienvenida" class="hidden space-y-6">
            <h1 class="text-3xl font-black text-emerald-400">¡Bienvenid@! 🎉</h1>
            <div class="bg-slate-900/60 p-4 rounded-xl border border-slate-700 font-mono text-left space-y-2">
                <p class="text-xs text-slate-500 uppercase tracking-wider font-bold">Datos recuperados de tu Sheets:</p>
                <p class="text-emerald-400 font-bold" id="datos-usuario">👤 Usuario: </p>
                <p class="text-sky-300 text-sm break-all" id="datos-email">✉️ ID: </p>
                <p class="text-yellow-400 font-bold" id="datos-patrimonio">💰 Patrimonio: </p>
            </div>
            <button onclick="cerrarSesion()" class="text-xs text-red-400 underline font-semibold cursor-pointer block mx-auto">
                Cerrar Sesión (Volver al Hola Mundo)
            </button>
        </div>

    </div>

    <script>
        // ========================================================
        //  PEGA ACÁ LA URL /exec DE TU NUEVO APPS SCRIPT
        // ========================================================
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxhsAXaDfz8uOn3SWcA_vwnyoOD8iU38jJ_K2klsHGermooyFX-rVVW4FfgrlEmmumXeA/exec";

        function cambiarSeccion(idSeccion) {
            // Ocultamos todas las vistas del contenedor
            document.getElementById('pantalla-inicio').classList.add('hidden');
            document.getElementById('seccion-login').classList.add('hidden');
            document.getElementById('seccion-registro').classList.add('hidden');
            document.getElementById('pantalla-bienvenida').classList.add('hidden');
            
            // Mostramos la elegida
            document.getElementById(idSeccion).classList.remove('hidden');
        }

        function ejecutarLogin() {
            const emailValue = document.getElementById('login-email').value.trim();
            if(!emailValue) return alert("Por favor, ingresá tu identificador");

            // Hacemos la consulta directa al Sheets sin recargar la página entera
            fetch(`${SCRIPT_URL}?action=login&email=${encodeURIComponent(emailValue)}`)
                .then(res => res.json())
                .then(data => {
                    if(data.status === "success") {
                        cargarPanelBienvenida(data);
                    } else {
                        alert("Error: " + data.message);
                    }
                })
                .catch(err => alert("Error al conectar con la base de datos"));
        }

        function ejecutarRegistro() {
            const emailValue = document.getElementById('reg-email').value.trim();
            const userValue = document.getElementById('reg-username').value.trim();

            if(!emailValue || !userValue) return alert("Completá ambos campos");

            fetch(`${SCRIPT_URL}?action=register&email=${encodeURIComponent(emailValue)}&username=${encodeURIComponent(userValue)}`)
                .then(res => res.json())
                .then(data => {
                    if(data.status === "success") {
                        alert("¡Usuario creado con éxito en Sheets!");
                        cargarPanelBienvenida(data);
                    } else {
                        alert("Error: " + data.message);
                    }
                })
                .catch(err => alert("Error al registrar el usuario"));
        }

        function cargarPanelBienvenida(datos) {
            document.getElementById('datos-usuario').innerText = `👤 Usuario: ${datos.username}`;
            document.getElementById('datos-email').innerText = `✉️ ID: ${datos.email}`;
            document.getElementById('datos-patrimonio').innerText = `💰 Patrimonio: ${datos.patrimonio} EC`;
            cambiarSeccion('pantalla-bienvenida');
        }

        function cerrarSesion() {
            document.getElementById('login-email').value = "";
            document.getElementById('reg-email').value = "";
            document.getElementById('reg-username').value = "";
            cambiarSeccion('pantalla-inicio');
        }
    </script>
</body>
</html>
